# ============================================================
# postgresql.conf — Memory MCP Server (production)
# ============================================================
# Базовые настройки для сервера с 1.5G RAM и pgvector
# ============================================================

# ---------- Подключения ----------
max_connections = 50                     # Пул приложения 20 + запас на миграции/бэкапы
superuser_reserved_connections = 5       # Для администрирования
listen_addresses = '*'                   # Принимаем внутри Docker-сети

# ---------- Память ----------
shared_buffers = 384MB                   # 25% от RAM (1.5G) — стандартная рекомендация
effective_cache_size = 1GB               # ~70% от RAM
work_mem = 32MB                          # На одно соединение: 50 * 32MB = 1.6G пиково
maintenance_work_mem = 256MB             # Для VACUUM, CREATE INDEX (IVFFlat/HNSW)
hash_mem_multiplier = 2.0                # pg17: для битовых карт и хеш-джойнов

# ---------- WAL ----------
wal_level = replica                      # Нужно для бэкапов (pg_basebackup)
max_wal_size = 2GB
min_wal_size = 512MB
wal_buffers = 8MB
wal_compression = zstd                   # pg17: zstd — эффективное сжатие WAL

# ---------- Планировщик ----------
random_page_cost = 1.1                   # SSD (не spinning disk)
effective_io_concurrency = 200           # SSD
default_statistics_target = 500          # Лучшие планы для векторов

# ---------- Аутовакуум ----------
autovacuum = on
autovacuum_max_workers = 3               # Для 1.5G RAM — не жадничаем
autovacuum_naptime = 30s                 # Чаще проверяем
autovacuum_vacuum_scale_factor = 0.01    # Раньше начинаем чистить (1% изменений)
autovacuum_vacuum_threshold = 100        # Минимум строк для старта

# ---------- Логирование ----------
log_destination = 'stderr'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500ms       # Медленные запросы (>500ms)
log_checkpoints = on
log_autovacuum_min_duration = 0          # Логируем всю активность автовакуума
log_lock_waits = on
log_temp_files = 0                       # Логируем временные файлы (диски — плохо)

# ---------- pgvector ----------
# Важно: векторы 8192-dim занимают ~32KB на строку
# shared_buffers должен вмещать активный набор
# work_mem — достаточно для сортировки результатов поиска
